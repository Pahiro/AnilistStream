<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AnilistStream</title>

        <style>
            :root {
                --bg: #000000;
                --primary: #0066cc;
                --primary-dark: #0052a3;
                --text-main: #eeeeee;
                --text-muted: #aaaaaa;
                --text-footer: #555555;
                --border-primary: #333333;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                background: var(--bg);
                color: var(--text-main);
                font-family:
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    sans-serif;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
            }

            .container {
                flex: 1;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 18px;
                text-align: center;
                padding: 24px;
            }

            .logo {
                width: 110px;
                height: auto;
            }

            h1 {
                font-size: 42px;
                margin: 0;
            }

            .description {
                color: var(--text-muted);
                max-width: 420px;
                line-height: 1.5;
                margin: 0;
            }

            .install-btn {
                background: var(--primary);
                color: white;
                padding: 14px 28px;
                border-radius: 8px;
                border: none;
                font-weight: 600;
                font-size: 16px;
                cursor: pointer;
                transition: background 0.2s ease;
                text-decoration: none;
            }

            .install-btn:hover {
                background: var(--primary-dark);
            }

            .configure-btn {
                margin-top: 10px;
                color: var(--text-muted);
                text-decoration: none;
                transition: color 0.2s ease;
            }

            .configure-btn:hover {
                color: var(--primary);
            }

            footer {
                text-align: center;
                color: var(--text-footer);
                padding: 24px;
            }

            .hidden {
                display: none;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <img src="/logo.png" alt="AnilistStream Logo" class="logo" />

            <h1>AnilistStream</h1>

            <p class="description">
                Stream anime directly in Stremio with automatic AniList progress
                syncing.
            </p>

            <button id="installBtn" class="install-btn">Install Addon</button>

            <a href="/configure" class="configure-btn"> Configure Addon </a>
        </div>

        <footer>Powered by AniList</footer>

        <script>
            const serverUrl = "{{ server_url }}";
            const manifestUrl = `${serverUrl}/manifest.json`;
            const btn = document.getElementById("installBtn");

            function isLocal(url) {
                return (
                    url.includes("localhost") ||
                    url.includes("127.0.0.1") ||
                    /:\d+/.test(url) ||
                    url.startsWith("http://")
                );
            }

            if (isLocal(serverUrl)) {
                btn.textContent = "Copy Manifest URL";

                btn.onclick = async () => {
                    try {
                        await navigator.clipboard.writeText(manifestUrl);

                        const oldText = btn.textContent;
                        btn.textContent = "Copied!";

                        setTimeout(() => {
                            btn.textContent = oldText;
                        }, 2000);
                    } catch (err) {
                        alert(manifestUrl);
                    }
                };
            } else {
                const clean = serverUrl.replace(/^https?:\/\//, "");

                btn.onclick = () => {
                    window.location.href = `stremio://${clean}/manifest.json`;
                };
            }
        </script>
    </body>
</html>
