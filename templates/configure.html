<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Configure AnilistStream</title>

        <style>
            :root {
                --bg: #000000;
                --primary: #0066cc;
                --primary-dark: #0052a3;
                --text-main: #eeeeee;
                --text-muted: #aaaaaa;
                --text-footer: #555555;
                --border-primary: #333333;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                background: var(--bg);
                color: var(--text-main);
                font-family:
                    system-ui,
                    -apple-system,
                    sans-serif;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
            }

            .container {
                flex: 1;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 18px;
                text-align: center;
                padding: 24px;
            }

            .logo {
                width: 110px;
                height: auto;
            }

            h1 {
                font-size: 42px;
                margin: 0;
            }

            .description {
                color: var(--text-muted);
                max-width: 420px;
                line-height: 1.5;
                margin: 0;
            }

            .install-btn {
                background: var(--primary);
                color: white;
                padding: 14px 28px;
                border-radius: 8px;
                border: none;
                font-weight: 600;
                font-size: 16px;
                cursor: pointer;
                transition: background 0.2s ease;
                text-decoration: none;
                display: inline-block;
            }

            .install-btn:hover {
                background: var(--primary-dark);
            }

            .configure-btn {
                margin-top: 10px;
                color: var(--text-muted);
                text-decoration: none;
                transition: color 0.2s ease;
            }

            .configure-btn:hover {
                color: var(--primary);
            }

            .token-box {
                border: 1px solid var(--border-primary);
                padding: 16px;
                border-radius: 8px;
                margin-bottom: 20px;
                max-width: 500px;
                width: 100%;
            }

            code {
                word-break: break-all;
            }

            footer {
                text-align: center;
                color: var(--text-footer);
                padding: 24px;
            }

            .hidden {
                display: none;
            }
        </style>
    </head>

    <body>
        <div class="container">
            <img src="/logo.png" alt="AnilistStream Logo" class="logo" />

            <h1>AnilistStream</h1>

            <p class="description">
                Connect your AniList account to install the addon
            </p>

            <div id="login-state">
                <a
                    class="install-btn"
                    href="https://anilist.co/api/v2/oauth/authorize?client_id={{ client_id }}&response_type=token"
                >
                    Login with AniList
                </a>
            </div>

            <div id="token-state" class="hidden">
                <div class="token-box">
                    <p class="description">
                        Manifest URL — paste into Stremio → Add-ons search box
                    </p>
                    <code id="manifest-url"></code>
                </div>

                <button id="copyBtn" class="install-btn">Copy manifest URL</button>
                <a id="appBtn" class="install-btn" href="#">Install in Stremio app</a>
                <a id="webBtn" class="configure-btn" target="_blank" rel="noopener" href="#">
                    Install in Stremio Web
                </a>
            </div>

            <a href="/" class="configure-btn"> ← Back to Home </a>
        </div>

        <footer>Powered by AniList</footer>

        <script>
            const serverUrl = "{{ server_url }}";

            const loginState = document.getElementById("login-state");
            const tokenState = document.getElementById("token-state");

            let token = null;

            if (window.location.hash.includes("access_token=")) {
                const params = new URLSearchParams(
                    window.location.hash.substring(1),
                );

                token = params.get("access_token");

                if (token) {
                    sessionStorage.setItem("anilist_token", token);
                    history.replaceState(null, "", "/configure");
                }
            }

            if (!token) {
                token = sessionStorage.getItem("anilist_token");
            }

            if (token) {
                loginState.classList.add("hidden");
                tokenState.classList.remove("hidden");

                const clean = serverUrl.replace(/^https?:\/\//, "");
                const manifest =
                    serverUrl + "/" + encodeURIComponent(token) + "/manifest.json";

                document.getElementById("manifest-url").textContent = manifest;
                document.getElementById("appBtn").href =
                    `stremio://${clean}/${encodeURIComponent(token)}/manifest.json`;
                document.getElementById("webBtn").href =
                    `https://web.stremio.com/#/addons?addon=${encodeURIComponent(manifest)}`;

                const copyBtn = document.getElementById("copyBtn");
                copyBtn.onclick = async () => {
                    try {
                        await navigator.clipboard.writeText(manifest);
                        copyBtn.innerText = "Copied!";
                        setTimeout(() => {
                            copyBtn.innerText = "Copy manifest URL";
                        }, 2000);
                    } catch {
                        alert(manifest);
                    }
                };
            }
        </script>
    </body>
</html>
